<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marc Runner</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #87ceeb;
}
#gameArea {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(to top, #d3f0ff 0%, #87ceeb 100%);
}
#player {
    position: absolute;
    bottom: 50px;
    left: 100px;
    width: 60px;
    height: 80px;
    background: url('https://i.imgur.com/7y7U2h0.png') no-repeat center/contain;
}
.obstacle, .coin {
    position: absolute;
    width: 50px;
    height: 50px;
    background-size: contain;
    background-repeat: no-repeat;
}
.obstacle {
    background-image: url('https://i.imgur.com/Tn6w4sB.png');
}
.coin {
    background-image: url('https://i.imgur.com/hF9mF5g.png');
}
#scoreboard {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
    font-weight: bold;
    color: #000;
    background: rgba(255,255,255,0.7);
    padding: 5px 10px;
    border-radius: 10px;
}
</style>
</head>
<body>
<div id="scoreboard">Score: 0</div>
<div id="gameArea">
    <div id="player"></div>
</div>

<script>
const gameArea = document.getElementById('gameArea');
const player = document.getElementById('player');
const scoreboard = document.getElementById('scoreboard');

let playerBottom = 50;
let isJumping = false;
let score = 0;
let obstacles = [];
let coins = [];
let gameInterval, obstacleInterval, coinInterval;

function startGame() {
    score = 0;
    obstacles.forEach(o=>gameArea.removeChild(o.el));
    coins.forEach(c=>gameArea.removeChild(c.el));
    obstacles = [];
    coins = [];
    scoreboard.textContent = 'Score: 0';
    player.style.bottom = '50px';
    gameInterval = setInterval(updateGame, 20);
    obstacleInterval = setInterval(spawnObstacle, 1500);
    coinInterval = setInterval(spawnCoin, 2000);
}

function updateGame() {
    // move obstacles
    obstacles.forEach(o=>{
        o.x -= o.speed;
        o.el.style.left = o.x + 'px';
        // collision
        if(o.x < 160 && o.x + 50 > 100 && playerBottom < 100){
            endGame();
        }
    });
    obstacles = obstacles.filter(o=>{
        if(o.x + 50 < 0){
            gameArea.removeChild(o.el);
            return false;
        }
        return true;
    });
    
    // move coins
    coins.forEach(c=>{
        c.x -= c.speed;
        c.el.style.left = c.x + 'px';
        // collect
        if(c.x < 160 && c.x + 50 > 100 && playerBottom < 100){
            score += 5;
            scoreboard.textContent = 'Score: ' + score;
            gameArea.removeChild(c.el);
            c.collected = true;
        }
    });
    coins = coins.filter(c=>!c.collected && c.x + 50 > 0);
    
    // jump mechanics
    if(isJumping){
        if(playerBottom < 200) playerBottom += 10;
        else isJumping = false;
    } else if(playerBottom > 50){
        playerBottom -= 10;
    }
    player.style.bottom = playerBottom + 'px';
}

function spawnObstacle(){
    const el = document.createElement('div');
    el.className = 'obstacle';
    el.style.bottom = '50px';
    el.style.left = window.innerWidth + 'px';
    gameArea.appendChild(el);
    obstacles.push({el, x: window.innerWidth, speed: 5 + Math.floor(score/10)});
}

function spawnCoin(){
    const el = document.createElement('div');
    el.className = 'coin';
    el.style.bottom = 50 + Math.floor(Math.random()*100) + 'px';
    el.style.left = window.innerWidth + 'px';
    gameArea.appendChild(el);
    coins.push({el, x: window.innerWidth, speed: 5, collected:false});
}

function endGame(){
    clearInterval(gameInterval);
    clearInterval(obstacleInterval);
    clearInterval(coinInterval);
    alert('Game Over! Score: ' + score);
    startGame();
}

document.addEventListener('keydown', e=>{
    if(e.code==='Space'||e.code==='ArrowUp'){
        if(playerBottom===50) isJumping=true;
    }
});

startGame();
</script>
</body>
</html>
